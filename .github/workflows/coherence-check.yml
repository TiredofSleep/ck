name: Coherence Spectrometer

on:
  push:
    branches: [clay, main, master]
  pull_request:
    branches: [clay, main, master]
  workflow_dispatch:
    inputs:
      base:
        description: 'Semiprime base to test (default: 35)'
        required: false
        default: '35'

jobs:
  # ============================================================
  # Core coherence verification — T* = 5/7, sinc² field, CL table
  # ============================================================
  coherence-core:
    name: Core Algebra (T*=5/7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install numpy scipy matplotlib pytest 2>/dev/null || pip install numpy scipy pytest

      - name: Verify T* = 5/7 threshold
        run: |
          python -c "
          # T* = 5/7 is the coherence floor, derived not designed
          T_STAR = 5/7
          print(f'T* = 5/7 = {T_STAR:.10f}')
          # Cross-multiplication check (no division — same as silicon)
          for num, den in [(5, 7), (10, 14), (15, 21), (50, 70)]:
              assert 7 * num >= 5 * den, f'T* cross-multiply failed: {num}/{den}'
          print('T* cross-multiplication: PASS (matches silicon implementation)')
          "

      - name: Run core theorem verification
        run: |
          if [ -f ck_run.py ]; then
            python ck_run.py
          elif [ -f Gen10/ck_run.py ]; then
            cd Gen10 && python ck_run.py
          else
            echo "ck_run.py not found at root or Gen10/ — checking papers/"
            python -c "print('Core theorems: skipped (no runner found)')"
          fi

      - name: Run proof files (D-tier)
        working-directory: ${{ github.workspace }}
        run: |
          PASS=0; FAIL=0
          for f in papers/proof_d*.py papers/proof_d*/*.py 2>/dev/null; do
            [ -f "$f" ] || continue
            python "$f" > /dev/null 2>&1 && PASS=$((PASS+1)) || FAIL=$((FAIL+1))
          done
          echo "D-tier proofs: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

  # ============================================================
  # Sinc² field verification
  # ============================================================
  sinc2-field:
    name: Sinc² Spectral Field
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install numpy scipy

      - name: Verify sinc² at universal constants
        run: |
          python -c "
          import math

          def sinc2(x):
              if abs(x) < 1e-15: return 1.0
              return (math.sin(math.pi * x) / (math.pi * x)) ** 2

          # 4/pi^2 = sinc^2(1/2) — Universal Sidelobe Amplitude
          expected_4pi2 = 4 / math.pi**2
          got = sinc2(0.5)
          assert abs(got - expected_4pi2) < 1e-12, f'sinc2(1/2) mismatch: {got} vs {expected_4pi2}'
          print(f'sinc2(1/2) = 4/pi^2 = {got:.10f}  PASS')

          # sinc^2(0.1) ~ 0.9675 — scale-free pre-echo signal
          got01 = sinc2(0.1)
          assert abs(got01 - 0.96753) < 0.001, f'sinc2(0.1) = {got01}'
          print(f'sinc2(0.1) = {got01:.6f}  PASS')

          # Montgomery duality: R(x) + R2(x) = 1
          for x in [0.1, 0.25, 0.5, 0.75, 1.0]:
              R = sinc2(x)
              R2 = 1.0 - sinc2(x)
              assert abs(R + R2 - 1.0) < 1e-12
          print('Montgomery duality R(x) + R2(x) = 1: PASS for 5 test points')

          # Si(2pi)/pi — corridor spectral mean
          from scipy import integrate
          mean, _ = integrate.quad(lambda t: sinc2(t), 0, 1)
          Si_2pi_over_pi = 0.45141166679014325
          assert abs(mean - Si_2pi_over_pi) < 1e-8
          print(f'Corridor mean = Si(2pi)/pi = {mean:.12f}  PASS')
          "

      - name: Verify sinc² field across primes
        run: |
          python -c "
          import math

          def sinc2(x):
              if abs(x) < 1e-15: return 1.0
              return (math.sin(math.pi * x) / (math.pi * x)) ** 2

          def is_prime(n):
              if n < 2: return False
              for i in range(2, int(n**0.5)+1):
                  if n % i == 0: return False
              return True

          primes = [p for p in range(5, 200) if is_prime(p)]
          target = 4 / math.pi**2
          passed = 0
          for p in primes:
              mid = sinc2((p//2) / p)
              if abs(mid - target) < 0.06:   # within sidelobe tolerance
                  passed += 1
          print(f'Sinc2 field at mid-corridor: {passed}/{len(primes)} primes matched 4/pi^2 region')
          "

  # ============================================================
  # Gen12 HDL lint check (no Vivado needed)
  # ============================================================
  hdl-lint:
    name: Gen12 HDL Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install iverilog
        run: sudo apt-get install -y iverilog

      - name: Syntax-check Gen12 HDL modules
        run: |
          PASS=0; FAIL=0
          for f in Gen12/targets/ck_fpga_dog/hdl/*.v; do
            [ -f "$f" ] || continue
            # Syntax only — no elaboration (modules have unresolved deps)
            iverilog -t null -Wall "$f" 2>&1 | grep -v "^$" | head -5 || true
            # Check for parse errors specifically
            if iverilog -t null "$f" 2>&1 | grep -q "syntax error\|error:"; then
              echo "FAIL: $f"
              FAIL=$((FAIL+1))
            else
              echo "PASS: $f"
              PASS=$((PASS+1))
            fi
          done
          echo ""
          echo "HDL syntax: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

  # ============================================================
  # Python import check — all modules loadable
  # ============================================================
  python-imports:
    name: Python Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install numpy scipy requests flask 2>/dev/null || true

      - name: Check root Python files parse cleanly
        run: |
          PASS=0; FAIL=0
          for f in *.py Gen10/*.py 2>/dev/null; do
            [ -f "$f" ] || continue
            python -m py_compile "$f" 2>/dev/null && PASS=$((PASS+1)) || { echo "FAIL: $f"; FAIL=$((FAIL+1)); }
          done
          echo "Python syntax: $PASS passed, $FAIL failed"
          [ $FAIL -le 3 ] || exit 1   # allow up to 3 dependency-only failures
