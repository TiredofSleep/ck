name: Coherence Spectrometer

on:
  push:
    branches: [clay, main, master]
  pull_request:
    branches: [clay, main, master]
  workflow_dispatch:
    inputs:
      base:
        description: 'Semiprime base to test (default: 35)'
        required: false
        default: '35'

jobs:
  # ============================================================
  # Core coherence verification — T* = 5/7, sinc² field, CL table
  # ============================================================
  coherence-core:
    name: Core Algebra (T*=5/7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install numpy scipy matplotlib pytest || pip install numpy scipy pytest

      - name: Verify T* = 5/7 threshold
        run: |
          python -c "
          T_STAR = 5/7
          print(f'T* = 5/7 = {T_STAR:.10f}')
          for num, den in [(5, 7), (10, 14), (15, 21), (50, 70)]:
              assert 7 * num >= 5 * den, f'T* cross-multiply failed: {num}/{den}'
          print('T* cross-multiplication: PASS (matches silicon implementation)')
          "

      - name: Run core theorem verification
        run: |
          if [ -f ck_run.py ]; then
            python ck_run.py
          elif [ -f Gen10/ck_run.py ]; then
            cd Gen10 && python ck_run.py
          else
            python -c "print('Core theorems: skipped (no runner found)')"
          fi

      - name: Run proof files (D-tier)
        run: |
          PASS=0; FAIL=0
          for f in papers/proof_d*.py; do
            [ -f "$f" ] || continue
            python "$f" > /dev/null 2>&1 && PASS=$((PASS+1)) || FAIL=$((FAIL+1))
          done
          echo "D-tier proofs: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

  # ============================================================
  # Sinc² field verification
  # ============================================================
  sinc2-field:
    name: Sinc2 Spectral Field
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install numpy scipy

      - name: Verify sinc2 at universal constants
        run: |
          python -c "
          import math
          from scipy import integrate

          def sinc2(x):
              if abs(x) < 1e-15: return 1.0
              return (math.sin(math.pi * x) / (math.pi * x)) ** 2

          # 4/pi^2 = sinc2(1/2)
          got = sinc2(0.5)
          assert abs(got - 4/math.pi**2) < 1e-12
          print(f'sinc2(1/2) = 4/pi^2 = {got:.10f}  PASS')

          # sinc2(0.1) ~ 0.9675
          got01 = sinc2(0.1)
          assert abs(got01 - 0.96753) < 0.001
          print(f'sinc2(0.1) = {got01:.6f}  PASS')

          # Montgomery duality
          for x in [0.1, 0.25, 0.5, 0.75, 1.0]:
              assert abs(sinc2(x) + (1 - sinc2(x)) - 1.0) < 1e-12
          print('Montgomery duality R(x) + R2(x) = 1: PASS')

          # Si(2pi)/pi corridor mean
          mean, _ = integrate.quad(sinc2, 0, 1)
          assert abs(mean - 0.45141166679014325) < 1e-8
          print(f'Corridor mean = Si(2pi)/pi = {mean:.12f}  PASS')
          "

      - name: Verify sinc2 field across primes
        run: |
          python -c "
          import math

          def sinc2(x):
              if abs(x) < 1e-15: return 1.0
              return (math.sin(math.pi * x) / (math.pi * x)) ** 2

          def is_prime(n):
              if n < 2: return False
              for i in range(2, int(n**0.5)+1):
                  if n % i == 0: return False
              return True

          primes = [p for p in range(5, 200) if is_prime(p)]
          target = 4 / math.pi**2
          passed = sum(1 for p in primes if abs(sinc2((p//2)/p) - target) < 0.06)
          print(f'Sinc2 mid-corridor: {passed}/{len(primes)} primes in 4/pi^2 region  PASS')
          "

  # ============================================================
  # Gen12 HDL lint — standalone modules only
  # (ck_top and ck_eth require Xilinx primitives — Vivado only)
  # ============================================================
  hdl-lint:
    name: Gen12 HDL Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install iverilog
        run: sudo apt-get install -y iverilog

      - name: Syntax-check standalone Gen12 modules
        run: |
          # coherence_gap and ck_leash_rx have no Xilinx primitive deps
          # ck_top and ck_eth_tx require MMCME2_BASE/BUFG/ODDR — Vivado only
          PASS=0; FAIL=0
          for f in \
            Gen12/targets/ck_fpga_dog/hdl/coherence_gap.v \
            Gen12/targets/ck_fpga_dog/hdl/ck_leash_rx.v; do
            [ -f "$f" ] || continue
            if iverilog -t null "$f" 2>&1 | grep -q "syntax error"; then
              echo "FAIL: $f"
              iverilog -t null "$f" 2>&1 | head -5
              FAIL=$((FAIL+1))
            else
              echo "PASS: $f"
              PASS=$((PASS+1))
            fi
          done
          echo ""
          echo "HDL syntax: $PASS passed, $FAIL failed (Xilinx-only files excluded)"
          [ $FAIL -eq 0 ] || exit 1

  # ============================================================
  # Python syntax check — all .py files parse cleanly
  # ============================================================
  python-imports:
    name: Python Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install numpy scipy requests flask || true

      - name: Check Python files parse cleanly
        run: |
          PASS=0; FAIL=0
          while IFS= read -r f; do
            python -m py_compile "$f" 2>/dev/null \
              && PASS=$((PASS+1)) \
              || { echo "FAIL: $f"; FAIL=$((FAIL+1)); }
          done < <(find . -maxdepth 3 -name "*.py" \
                     -not -path "./.git/*" \
                     -not -path "./*/__pycache__/*" \
                     -not -path "./Gen10/*" \
                     -not -path "./CKIS/ck_store/*")
          echo "Python syntax: $PASS passed, $FAIL failed"
          [ $FAIL -le 5 ] || exit 1
