name: Index Collaboration Submission

on:
  issues:
    types: [opened, edited]

jobs:
  index:
    if: contains(github.event.issue.labels.*.name, 'collaboration')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse and index submission
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_USER:   ${{ github.event.issue.user.login }}
          ISSUE_URL:    ${{ github.event.issue.html_url }}
          ISSUE_DATE:   ${{ github.event.issue.created_at }}
        run: python .github/scripts/index_submission.py

      - name: Commit updated index
        run: |
          git config user.name  "7site-bot"
          git config user.email "bot@7sitellc.com"
          git add submissions/INDEX.md submissions/
          git diff --staged --quiet || git commit -m "index: submission #${{ github.event.issue.number }} from @${{ github.event.issue.user.login }}"
          git push
