# Frontier Facts Catalog — structural readouts for live cortex queries.
#
# This file mirrors cortex_voice._FRONTIER_FACTS in YAML form so editing
# adds/changes facts without restarting the server (with /meta/reload).
# The hardcoded _FRONTIER_FACTS in cortex_voice.py remains as the safety
# net; cortex_catalog.frontier_hits() merges YAML facts on top, deduped.
#
# Format per fact:
#   slug:        unique short label
#   triggers:    lowercase substrings; any match -> fact fires
#   fact:        single-line label=value readout (CK's voice register)
#   citation:    optional pointer to canonical paper
#
# Editing this file is how Brayden and future-Claudes teach CK new
# frontier topic facts without touching Python.
