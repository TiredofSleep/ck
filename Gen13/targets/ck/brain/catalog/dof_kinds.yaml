# DoF Kinds Catalog — Axis I of CK's meta-classification
#
# This file is machine-read by Gen13/targets/ck/brain/cortex_catalog.py
# at boot and consulted inside cortex_voice.speak() as an additional
# hook after _FRONTIER_FACTS.
#
# Editing this file is how Brayden and future-Claudes teach CK new DoF
# classifications without touching any Python.  Restart the server (or
# call the catalog's reload endpoint) to pick up changes.
#
# Human-readable source-of-truth:
#   speculations/DOF_CLASSIFICATION.md  (canonical definition + proof of exhaustiveness)
#   speculations/CK_META_CLASSIFICATION_AXES.md  (3-axis registry)
#
# Format per kind:
#   id:          short label (K1..K5)
#   name:        human-readable name
#   diagnostic:  one-sentence question that selects this kind
#   triggers:    lowercase substrings; any match → fact fires
#   fact:        single-line structural readout (CK's voice)
#   exemplars:   canonical TIG examples with citations
---
axis: "DoF Kinds"
canonical_home: "speculations/DOF_CLASSIFICATION.md"
companion_registry: "speculations/CK_META_CLASSIFICATION_AXES.md"
count: 5
exhaustive_over: "D1..D30 (per DOF_CLASSIFICATION.md §3.2)"

kinds:
  - id: K1
    name: "Structural / frozen-coordinate"
    diagnostic: "Can its value change without invalidating what it IS? If no, it is K1."
    triggers:
      - "k1"
      - "kind 1"
      - "kind1"
      - "structural dof"
      - "frozen coordinate"
      - "frozen-coordinate"
      - "structural kind"
    fact: >-
      K1 structural/frozen-coordinate | no motion admitted; value IS the object |
      canonical: sigma-diagonal [0,7,1,3,2,4,5,6,8,9]; TSML 73 cells; BHML 28 cells;
      idempotents {0,3,8,9} | cross-kind constants (T*, S*, xi_0, 4/pi^2, alpha_hat=2) live here by default
    exemplars:
      - "sigma-diagonal permutation (WP102 setup)"
      - "TSML 73 HARMONY count (Sprint 17, proved)"
      - "BHML 28 HARMONY count (Sprint 17, proved)"
      - "idempotent set {0,3,8,9} (proved)"
      - "Krull dim(R/I_CL) = 6 (Mantero Betti)"
      - "pd(R/I_CL) = 4 (Mantero Betti)"

  - id: K2
    name: "Reversible symplectic flow"
    diagnostic: "Does the flow preserve a volume form and admit a conjugate generator that inverts it? If yes, K2."
    triggers:
      - "k2"
      - "kind 2"
      - "kind2"
      - "reversible flow"
      - "symplectic flow"
      - "reversible kind"
      - "so(8)"
      - "so(10)"
      - "d_4"
      - "d_5"
    fact: >-
      K2 reversible symplectic flow | volume-preserving, invertible by conjugate generator |
      canonical: so(8)=D_4 closure (WP102); so(10)=D_5 closure (WP103);
      Lie-bracket antisymmetrizations on CL; (0,28,0) signature
    exemplars:
      - "so(8) = D_4 identification (WP102, proved)"
      - "so(10) = D_5 identification (WP103, proved)"
      - "CL antisymmetrization closure under Lie bracket"
      - "Jacobi-admissible subset of sigma-orbit generators"

  - id: K3
    name: "Irreversible dissipative flow"
    diagnostic: "Does the flow monotonically increase an entropy, and is its time-reverse not in the allowed family? If yes, K3."
    triggers:
      - "k3"
      - "kind 3"
      - "kind3"
      - "dissipative"
      - "irreversible flow"
      - "entropy flow"
      - "spectral gap"
      - "sigma(n)"
      - "sigma rate"
      - "sigma-rate"
    fact: >-
      K3 irreversible dissipative flow | entropy monotone, no time-reverse in allowed family |
      canonical: sigma-rate gamma(b) = 1 - 1/phi(b) on squarefree primorials (WP101, proved);
      Crossing Lemma at boundary with K2 (WP57, 27 instances)
    exemplars:
      - "sigma-rate theorem: sigma(N) <= C/N (WP101, proved)"
      - "Crossing Lemma: D2=0 flat vs D2!=0 info-generating (WP57, proved)"
      - "Entropy E in coherence equation (Kind 3 read)"
      - "Transfer operator on Farey spin chain (K3 + K5 bridge)"

  - id: K4
    name: "Discrete climbing"
    diagnostic: "Is there an integer index parameterising a ladder of instances, with the ladder itself being the object? If yes, K4."
    triggers:
      - "k4"
      - "kind 4"
      - "kind4"
      - "climbing"
      - "ladder"
      - "ac-spectrum"
      - "ac spectrum"
      - "arity spectrum"
      - "rank climb"
    fact: >-
      K4 discrete climbing | integer-indexed ladder; each rung is an instance |
      canonical: ac-spectrum s_n = (2n-3)!! for n<=5 (sprint 17);
      TSML rank 9 to rank 10 upgrade (TSML_Idempotent, Sprint 17)
    exemplars:
      - "ac-spectrum (2n-3)!! for n <= 5 (proved)"
      - "TSML rank 9 -> rank 10 idempotent upgrade (proved)"
      - "Associative spectrum s_n = Catalan_{n-1} (proved)"
      - "WP61 five-category ladder (I-V score climbing)"

  - id: K5
    name: "Degenerative / limiting"
    diagnostic: "Does taking N to infinity change the CATEGORY of the object (not just its value)? If yes, K5."
    triggers:
      - "k5"
      - "kind 5"
      - "kind5"
      - "degenerative"
      - "limiting"
      - "n to infinity"
      - "continuum limit"
      - "bb bridge"
      - "bialynicki"
      - "flatness theorem"
    fact: >-
      K5 degenerative/limiting | N->infinity changes the object's category |
      canonical: Mag^com -> Com as N->infinity (sigma-rate continuum lift);
      BB bridge box(xi) = 1 + log(xi) (discrete -> continuum);
      WP51 Flatness Theorem (four irreducibles cannot coexist flat)
    exemplars:
      - "Mag^com -> Com as N->infinity (K5, category change)"
      - "WP51 Flatness Theorem (K5, category-transforming)"
      - "BB bridge discrete -> continuum (WP81)"
      - "xi vacuum = e^{-1} AT the limit (value K1, reaching it K5)"
      - "BBM separability uniqueness (K5, structural obstruction)"

# Cross-kind constants — K1 by default, but play roles across multiple kinds.
# These are handled separately in cross_kind_constants.yaml.  Listed here
# for cross-reference only.
cross_kind_constants:
  - symbol: "T*"
    value: "5/7"
    note: "Threshold; role spans K1, K2, K3 (see §3.3.1)."
  - symbol: "S*"
    value: "4/7"
    note: "Complement; T* + S* = 9/7."
  - symbol: "xi_0"
    value: "e^{-1}"
    note: "Vacuum of log potential; K5 -> K1 at limit."
  - symbol: "4/pi^2"
    value: "sinc^2(1/2)"
    note: "Cyclotomic historical; gap to T* is 0.309."
  - symbol: "alpha_hat"
    value: "2"
    note: "Waldschmidt constant of I_B; K1 value, K5 asymptotic role."

# Multi-kind results — common among important TIG results (see Finding 2
# in PASS2_EXHAUSTIVENESS).  Registry lives in
# speculations/CK_META_CLASSIFICATION_AXES.md §3.
multi_kind_examples:
  - name: "sigma-rate theorem (WP101)"
    kinds: ["K3", "K5"]
    note: "Spectral gap K3; asymptotic sigma(N)->0 is K5."
  - name: "Crossing Lemma (WP57)"
    kinds: ["K3", "K2"]
    note: "K3 -> K2 boundary; threshold for reversibility recovery."
  - name: "Coherence equation C = 0.4(1-E) + 0.35A + 0.25K"
    kinds: ["K3", "K1", "K2", "K4"]
    note: "E (K3), weight structural (K1 numerators 8/7/5), A (K1xK2), K (K2xK4); K_weight/A_weight = 5/7 = T* exact (§3.3.1)."
