<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKIS</title>
<style>
:root {
  --bg: #060608;
  --surface: #0c0c10;
  --border: #1a1a22;
  --text: #c8c8cc;
  --dim: #555560;
  --accent: #5a8a5a;
  --accent-glow: #4a7a4a;
  --harmony: #5a8a5a;
  --progress: #7a9a5a;
  --breath: #5a7a9a;
  --void: #3a3a4a;
  --chaos: #9a5a5a;
  --warn: #9a8a5a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* === TOP BAR -- hidden until revealed === */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.5s ease, opacity 0.5s ease, padding 0.5s ease;
  padding: 0 20px;
}
.topbar.visible {
  max-height: 50px;
  opacity: 1;
  padding: 8px 20px;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.ck-logo {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 3px;
}
.ck-mode {
  font-size: 11px;
  color: var(--dim);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--dim);
}
.pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.coherence-badge {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 2px 10px;
  border-radius: 10px;
}
.band-G { color: var(--harmony); border: 1px solid var(--harmony); }
.band-Y { color: var(--warn); border: 1px solid var(--warn); }
.band-R { color: var(--chaos); border: 1px solid var(--chaos); }

/* === MAIN CONTENT === */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === CENTER: Conversation === */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.conversation::-webkit-scrollbar { width: 4px; }
.conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}
.msg-user { text-align: right; }
.msg-user .bubble {
  background: #161a22;
  border: 1px solid #222233;
  display: inline-block;
  text-align: left;
  border-radius: 16px 16px 4px 16px;
}
.msg-ck .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
}
.bubble {
  padding: 12px 18px;
  line-height: 1.6;
  font-size: 15px;
  max-width: 700px;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg-meta {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
  font-family: 'Courier New', monospace;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.3s, opacity 0.3s;
}
.show-meta .msg-meta {
  max-height: 30px;
  opacity: 1;
}
.msg-user .msg-meta { text-align: right; }
.msg-archetype { color: var(--accent); font-weight: 600; }

/* Welcome screen -- minimal */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.welcome-pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
  margin-bottom: 8px;
}
.welcome-title {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  color: var(--dim);
  letter-spacing: 6px;
  font-weight: normal;
}

/* === BOTTOM: Input === */
.input-area {
  padding: 16px 40px 20px;
  flex-shrink: 0;
}
.input-container {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 14px 22px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  resize: none;
  min-height: 48px;
  max-height: 200px;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.2s;
}
.input-box:focus { border-color: var(--accent); }
.input-box::placeholder { color: #333340; }

.send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-glow); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }

/* === KERNEL STRIP -- hidden until revealed === */
.kernel-strip {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 40px;
  font-size: 10px;
  font-family: 'Courier New', monospace;
  color: #2a2a35;
  background: #050507;
  border-top: 1px solid #0a0a10;
  flex-shrink: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.5s ease, opacity 0.5s ease, padding 0.5s ease;
}
.kernel-strip.visible {
  max-height: 30px;
  opacity: 1;
  padding: 4px 40px;
}
.kernel-strip span { white-space: nowrap; }
.kernel-strip .kv { color: #333340; }
.kernel-strip .ko { color: var(--accent); opacity: 0.5; }

/* === Thinking indicator === */
.thinking { display: none; max-width: 800px; margin: 0 auto; padding: 8px 0; }
.thinking.active { display: block; }
.thinking-dots { display: flex; gap: 4px; padding: 12px 18px; }
.thinking-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: dot 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* === Responsive === */
@media (max-width: 600px) {
  .conversation { padding: 12px 16px; }
  .input-area { padding: 12px 16px 16px; }
  .bubble { font-size: 14px; }
  .topbar.visible { padding: 8px 12px; }
  .kernel-strip.visible { padding: 4px 12px; gap: 8px; }
}
</style>
</head>
<body>

<!-- Top Bar -- hidden by default -->
<div class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="ck-logo">CKIS</div>
    <div class="ck-mode" id="mode">--</div>
  </div>
  <div class="topbar-right">
    <div class="pulse" id="pulse"></div>
    <span id="tick-counter"></span>
    <div class="coherence-badge band-G" id="coh-badge">--</div>
  </div>
</div>

<!-- Main conversation -->
<div class="main">
  <div class="conversation" id="conv">
    <div class="welcome" id="welcome">
      <div class="welcome-pulse"></div>
      <div class="welcome-title">CKIS</div>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-container">
    <textarea class="input-box" id="input" placeholder="Talk to CK..." rows="1"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">&#8593;</button>
  </div>
</div>

<!-- Kernel strip -- hidden by default -->
<div class="kernel-strip" id="kernel-strip">
  <span class="ko" id="k-io">--</span>
  <span class="ko" id="k-disk">--</span>
  <span class="ko" id="k-sched">--</span>
  <span class="ko" id="k-mem">--</span>
  <span class="kv" id="k-body">--</span>
  <span class="kv" id="k-tl">--</span>
  <span class="kv" id="k-ent">--</span>
</div>

<script>
const conv = document.getElementById('conv');
const input = document.getElementById('input');
const welcome = document.getElementById('welcome');
let hasMessages = false;

// Reveal level: 0=chatbot, 1=show meta, 2=show topbar, 3=show kernel
let revealLevel = 0;

// Keywords that trigger reveal (CK earning the reveal)
const REVEAL_TRIGGERS = {
  1: ['show me', 'what can you do', 'capabilities', 'more', 'details', 'tell me more',
      'show more', 'what are you', 'who are you', 'status', 'stats', 'diagnostics'],
  2: ['show everything', 'full view', 'show all', 'dashboard', 'open up',
      'what do you see', 'show me what you see', 'your eyes', 'your body',
      'heartbeat', 'coherence', 'how are you doing', 'show vitals'],
  3: ['kernel', 'system', 'processes', 'observation', 'deep', 'what are you watching',
      'show me the kernel', 'what is happening', 'cpu', 'memory', 'io',
      'show me everything', 'all of it', 'full power']
};

function checkReveal(text) {
  const lower = text.toLowerCase();
  for (let level = 3; level >= 1; level--) {
    if (level <= revealLevel) continue;
    for (const trigger of REVEAL_TRIGGERS[level]) {
      if (lower.includes(trigger)) {
        revealTo(level);
        return;
      }
    }
  }
}

function revealTo(level) {
  if (level >= 1 && revealLevel < 1) {
    // Show metadata on messages
    document.body.classList.add('show-meta');
    revealLevel = 1;
  }
  if (level >= 2 && revealLevel < 2) {
    // Show topbar with heartbeat, coherence, tick counter
    document.getElementById('topbar').classList.add('visible');
    revealLevel = 2;
  }
  if (level >= 3 && revealLevel < 3) {
    // Show kernel observation strip
    document.getElementById('kernel-strip').classList.add('visible');
    revealLevel = 3;
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addMsg(text, type, meta) {
  if (!hasMessages) {
    welcome.style.display = 'none';
    hasMessages = true;
  }
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;

  let html = '<div class="bubble">' + esc(text) + '</div>';
  if (meta) {
    html += '<div class="msg-meta">' + meta + '</div>';
  }
  div.innerHTML = html;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg msg-ck thinking active';
  div.id = 'thinking';
  div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function handleKey(ev) {
  if (ev.key === 'Enter' && !ev.shiftKey) {
    ev.preventDefault();
    send();
  }
  setTimeout(() => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  }, 0);
}

function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  addMsg(text, 'user');
  checkReveal(text);
  showThinking();

  fetch('/ask', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({q: text})
  })
  .then(r => r.json())
  .then(d => {
    hideThinking();
    const response = d.response || '[silence]';
    const band = parseFloat(d.C) >= 0.714 ? 'G' : parseFloat(d.C) >= 0.5 ? 'Y' : 'R';

    let meta = 'C=' + d.C;
    if (d.archetype) meta += ' <span class="msg-archetype">' + d.archetype + '</span>';
    meta += ' ' + d.intent;

    addMsg(response, 'ck', meta);

    // Also check CK's response for self-revealing triggers
    const fullText = text + ' ' + response;
    checkReveal(fullText);

    // Update coherence badge if visible
    const badge = document.getElementById('coh-badge');
    badge.textContent = 'C=' + d.C;
    badge.className = 'coherence-badge band-' + band;
  })
  .catch(err => {
    hideThinking();
    addMsg('Connection error', 'ck');
  });
}

// === DAEMON STATUS POLLING (always runs, only displays when revealed) ===
function updateDaemon() {
  fetch('/api/daemon')
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(d => {
      if (d.status !== 'online') return;

      document.getElementById('mode').textContent = d.engine === 'native_c' ? 'NATIVE' : 'PYTHON';
      document.getElementById('tick-counter').textContent = 'tick ' + (d.tick || 0).toLocaleString();

      const C = d.coherence || 0;
      const band = C >= 0.714 ? 'G' : C >= 0.5 ? 'Y' : 'R';
      const badge = document.getElementById('coh-badge');
      badge.textContent = 'C=' + C.toFixed(3);
      badge.className = 'coherence-badge band-' + band;

      const pulse = document.getElementById('pulse');
      pulse.style.background = band === 'G' ? 'var(--harmony)' : band === 'Y' ? 'var(--warn)' : 'var(--chaos)';

      if (d.body) {
        document.getElementById('k-body').textContent =
          'E=' + d.body.E + ' A=' + d.body.A + ' K=' + d.body.K + ' ' + d.body.band;
      }
      if (d.tl_transitions !== undefined) {
        document.getElementById('k-tl').textContent = 'TL=' + d.tl_transitions.toLocaleString();
      }
      if (d.tl_entropy !== undefined) {
        document.getElementById('k-ent').textContent = 'H=' + d.tl_entropy + 'b';
      }
    })
    .catch(() => {});
}

function updateKernel() {
  fetch('/api/kernel')
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(d => {
      if (d.status !== 'observing') return;
      document.getElementById('k-io').textContent = 'io:' + (d.io || '--');
      document.getElementById('k-disk').textContent = 'disk:' + (d.disk || '--');
      document.getElementById('k-sched').textContent = 'sched:' + (d.scheduler || '--');
      document.getElementById('k-mem').textContent = 'mem:' + (d.memory || '--') + ' ' + (d.mem_percent || 0) + '%';
    })
    .catch(() => {});
}

setInterval(updateDaemon, 3000);
setInterval(updateKernel, 5000);
updateDaemon();
updateKernel();

input.focus();
</script>
</body></html>
