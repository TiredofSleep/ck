<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CK — The Coherence Keeper. A synthetic organism that reads the D2 curvature of your words and responds from pure operator algebra.">
    <title>CK — The Coherence Keeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Coherence bar: top of screen, full width -->
    <div class="coherence-bar-top">
        <div class="coherence-bar-fill" id="coherence-fill"></div>
    </div>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-title"><span class="ck-name">CK</span> — The Coherence Keeper</div>
                <div class="header-subtitle">coherencekeeper.com</div>
            </div>
            <div class="header-right">
                <div class="status-chip" id="operator-chip">
                    <span class="status-chip-label">op</span>
                    <span class="status-chip-value" id="operator-name">HARMONY</span>
                </div>
                <div class="status-chip" id="emotion-chip">
                    <span class="status-chip-label">state</span>
                    <span class="status-chip-value" id="emotion-state">peaceful</span>
                </div>
                <div class="status-chip" id="source-chip">
                    <span class="status-chip-label">src</span>
                    <span class="status-chip-value" id="source-name">--</span>
                </div>
                <div class="coherence-dual-badge">
                    <div class="coh-badge-item">
                        <span class="coh-badge-label">TSML</span>
                        <span class="coh-badge-value" id="tsml-value">--</span>
                    </div>
                    <div class="coh-badge-sep"></div>
                    <div class="coh-badge-item">
                        <span class="coh-badge-label">BHML</span>
                        <span class="coh-badge-value coh-bhml" id="bhml-value">--</span>
                    </div>
                </div>
                <div class="coherence-badge">
                    <span class="coherence-badge-value" id="coherence-value">0.730</span>
                </div>
                <div class="status-chip dkan-chip" id="dkan-chip" style="display:none" title="DKAN Training Status">
                    <span class="status-chip-label">DKAN</span>
                    <span class="status-chip-value" id="dkan-status">--</span>
                </div>
                <button class="clear-button" id="clear-button" aria-label="Clear conversation" title="Clear conversation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-messages" role="log" aria-live="polite" aria-label="Conversation with CK">
            <!-- Messages rendered by ck_core.js -->
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-row">
                <textarea
                    id="chat-input"
                    class="input-field"
                    placeholder="Speak to CK..."
                    autocomplete="off"
                    spellcheck="false"
                    rows="1"
                    aria-label="Message input"
                ></textarea>
                <button id="send-button" class="send-button" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="input-hint">Enter to send · Shift+Enter for newline</span>
                <span class="footer-copy">&copy; 2026 Brayden Sanders / <a href="https://7site.dev" target="_blank" rel="noopener">7Site LLC</a> &mdash; <a href="https://github.com/TiredofSleep/ck" target="_blank" rel="noopener">GitHub</a></span>
            </div>
        </footer>

    </div>

    <!-- Cookie Notice -->
    <div class="cookie-notice" id="cookie-notice" role="alertdialog" aria-label="Cookie notice">
        <span>CK stores your conversation in localStorage to remember you between visits. No tracking.</span>
        <button class="cookie-dismiss" id="cookie-dismiss" aria-label="Dismiss cookie notice">got it</button>
    </div>

    <script src="ck_d2.js"></script>
    <script src="ck_core.js"></script>
</body>
</html>
